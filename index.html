<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIGHTING DOG | Premium Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }
        .logo-font { font-family: 'Oswald', sans-serif; font-style: italic; text-transform: uppercase; }
        .glass-effect { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        
        .nav-item {
            font-size: 0.85rem;
            letter-spacing: -0.02em;
            transition: all 0.2s ease;
            white-space: nowrap;
            padding: 0.5rem 1.25rem;
            cursor: pointer;
            border-radius: 4px;
        }
        .nav-item.active {
            background: #dc2626;
            color: #ffffff !important;
            font-weight: 700;
        }
        
        .hero-gradient { background: radial-gradient(circle at 50% 50%, #1a0505 0%, #050505 100%); }
        .card-bg { background: rgba(25, 25, 25, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #dc2626; }

        .btn-red { background: #dc2626; transition: background 0.3s; color: white; }
        .btn-red:hover { background: #b91c1c; }
        .btn-outline { border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; }
        .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.3); }

        .pin-active { color: #ef4444; }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .attr-fire { background-color: #dc2626; }
        .attr-water { background-color: #2563eb; }
        .attr-earth { background-color: #16a34a; }
        .attr-wind { background-color: #eab308; color: #000; }
        
        .today-cell { border: 2px solid #dc2626 !important; background: rgba(220, 38, 38, 0.05) !important; }

        .cal-event-badge {
            font-size: 10px;
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid rgba(220, 38, 38, 0.4);
            color: #f87171;
            padding: 2px 4px;
            border-radius: 4px;
            margin-top: 2px;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: all 0.2s;
            cursor: pointer;
        }
        .cal-event-badge:hover {
            background: rgba(220, 38, 38, 0.4);
            color: #fff;
        }

        #loading-overlay {
            position: fixed; inset: 0; background: #050505; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }

        /* Hero Image Style */
        .hero-img-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 450px;
        }
        .main-logo-img {
            max-width: 95%;
            width: 700px;
            height: auto;
            filter: drop-shadow(0 0 50px rgba(220, 38, 38, 0.4));
            animation: floating 4s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="text-2xl font-black logo-font animate-pulse text-red-600">DOG HUB <span class="text-white">SYNCHRONIZING...</span></div>
    </div>

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass-effect">
        <div class="max-w-[1500px] mx-auto flex justify-between items-center px-6 py-4">
            <div class="text-2xl font-black logo-font tracking-tighter shrink-0 mr-8 cursor-pointer" onclick="navigateTo('home')">
                FIGHTING <span class="text-red-600">DOG</span>
            </div>
            <div id="main-nav" class="hidden lg:flex items-center space-x-1 text-gray-400 font-bold">
                <div class="nav-item active" onclick="navigateTo('home')">HOME</div>
                <div class="nav-item" onclick="navigateTo('notice')">공지사항</div>
                <div class="nav-item" onclick="navigateTo('resources')">자료실</div>
                <div class="nav-item" onclick="navigateTo('records')">듀얼기록</div>
                <div class="nav-item" onclick="navigateTo('calendar')">캘린더</div>
                <div class="nav-item" onclick="navigateTo('attributes')">듀얼 속성</div>
                <div class="nav-item" onclick="navigateTo('regular')">정규듀얼 정보</div>
                <div class="nav-item" onclick="navigateTo('siege')">공성전 정보</div>
            </div>
            <button class="lg:hidden text-white" onclick="toggleMobileMenu()"><i data-lucide="menu"></i></button>
        </div>
    </nav>

    <!-- Content Container -->
    <main id="app-root" class="pt-24 min-h-screen">
        <!-- Content will be injected here -->
    </main>

    <!-- Templates -->
    <script id="tpl-home" type="text/template">
        <section class="hero-gradient min-h-[65vh] flex flex-col items-center justify-center text-center px-6 overflow-hidden">
            <div class="max-w-4xl animate-fade-in hero-img-container">
                <!-- 텍스트 삭제 및 요청하신 이미지 배치 -->
                <img src="image_74a257.jpg" alt="FIGHTING DOG SYNDICATE" class="main-logo-img" 
                     onerror="this.src='d5886e03-d133-426a-b7a0-f93b225be807.jpeg';">
            </div>
        </section>
        <section class="max-w-7xl mx-auto px-6 py-16 grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="card-bg p-8 border-t-2 border-red-600 shadow-2xl">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2 tracking-widest uppercase"><i data-lucide="zap" class="text-red-500"></i> Upcoming Task</h3>
                <div id="upcoming-list" class="space-y-4"></div>
            </div>
            <div class="card-bg p-8 border-t-2 border-zinc-800">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2 tracking-widest uppercase"><i data-lucide="history" class="text-gray-500"></i> Past Record</h3>
                <div id="past-list" class="space-y-4"></div>
            </div>
        </section>
    </script>

    <script id="tpl-board" type="text/template">
        <div class="max-w-7xl mx-auto px-6 py-8 animate-fade-in">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black italic logo-font decoration-red-600 decoration-4 underline underline-offset-8" id="board-title">ARCHIVE</h2>
                <button onclick="openModal('board')" class="btn-red px-8 py-3 rounded-lg font-bold shadow-xl shadow-red-900/20">글쓰기</button>
            </div>
            <div class="card-bg overflow-hidden border border-white/5 shadow-2xl">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-gray-500 text-xs font-black uppercase tracking-widest">
                        <tr>
                            <th class="p-5 w-20 text-center">PIN</th>
                            <th class="p-5">TITLE</th>
                            <th class="p-5 w-40">DATE</th>
                            <th class="p-5 w-24 text-center">FILE</th>
                            <th class="p-5 w-32 text-center">ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="board-content" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </script>

    <script id="tpl-records" type="text/template">
        <div class="max-w-7xl mx-auto px-6 py-8 animate-fade-in">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <h2 class="text-3xl font-black italic logo-font">DUAL RECORDS</h2>
                <div class="flex gap-2 bg-white/5 p-1 rounded-lg">
                    <button onclick="switchRecordTab('team1')" id="tab-team1" class="px-6 py-2 rounded-md transition-all font-bold">1팀</button>
                    <button onclick="switchRecordTab('team2')" id="tab-team2" class="px-6 py-2 rounded-md transition-all font-bold">2팀</button>
                    <button onclick="switchRecordTab('siege')" id="tab-siege" class="px-6 py-2 rounded-md transition-all font-bold">공성전</button>
                </div>
                <button onclick="openModal('record')" class="btn-red px-8 py-3 rounded-lg font-bold">LOG DATA</button>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 card-bg p-6 border border-white/5">
                    <h4 class="text-lg font-bold mb-4 text-gray-400 uppercase tracking-widest">Efficiency Chart (Last 10)</h4>
                    <canvas id="rankingChart" height="200"></canvas>
                </div>
                <div class="card-bg p-6 overflow-y-auto max-h-[500px] border border-white/5">
                    <h4 class="text-lg font-bold mb-4 text-gray-400">Activity Log</h4>
                    <div id="record-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </script>

    <script id="tpl-calendar" type="text/template">
        <div class="max-w-7xl mx-auto px-6 py-8 animate-fade-in">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black italic logo-font">MISSION CALENDAR</h2>
                <div class="flex items-center gap-6 bg-white/5 p-2 rounded-full px-6 border border-white/5">
                    <button onclick="changeCalendarMonth(-1)" class="p-2 hover:text-red-500 transition-colors"><i data-lucide="chevron-left"></i></button>
                    <div class="text-2xl font-black logo-font text-red-500 min-w-[140px] text-center" id="calendar-header-title"></div>
                    <button onclick="changeCalendarMonth(1)" class="p-2 hover:text-red-500 transition-colors"><i data-lucide="chevron-right"></i></button>
                </div>
            </div>
            <div class="card-bg p-4 border border-white/5 shadow-2xl">
                <div class="grid grid-cols-7 gap-1 text-center font-black text-xs text-gray-600 mb-4 tracking-widest">
                    <div class="p-2 text-red-900">SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div class="text-blue-900">SAT</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
            </div>
        </div>
    </script>

    <script id="tpl-protected" type="text/template">
        <div class="max-w-7xl mx-auto px-6 py-20 flex flex-center justify-center">
            <div id="password-gate" class="card-bg p-12 text-center w-full max-w-md animate-fade-in border-t-4 border-red-600 shadow-2xl shadow-red-900/10">
                <i data-lucide="shield-check" class="mx-auto mb-6 text-red-600" size="64"></i>
                <h2 class="text-2xl font-bold mb-4" id="protected-title">데이터 베이스</h2>
                <p class="text-gray-500 mb-8 text-sm">기밀 정보 열람을 위해 인증 코드를 입력하십시오.</p>
                <input type="password" id="pw-input" class="w-full bg-black/60 border border-white/10 rounded-lg p-4 mb-4 text-center text-2xl tracking-[1em] focus:border-red-600 focus:bg-black outline-none transition-all" placeholder="******">
                <button onclick="verifyPassword()" class="w-full btn-red py-4 rounded-lg font-black text-lg">ENTER HUB</button>
            </div>
            <div id="protected-content" class="hidden w-full animate-fade-in">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <h2 class="text-4xl font-black italic logo-font" id="content-title">SYNDICATE INTEL</h2>
                    <div class="flex gap-4 w-full md:w-auto">
                        <input type="text" id="search-info" onkeyup="window.searchInfoGrid()" placeholder="ID 또는 이름 검색..." class="flex-1 bg-white/5 border border-white/10 rounded-lg px-6 py-3 focus:border-red-500 outline-none">
                        <button onclick="openModal('info')" class="btn-red px-8 py-3 rounded-lg font-bold shrink-0">ADD DATA</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="info-grid"></div>
            </div>
        </div>
    </script>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6-WVBhlZx8PA8qTmrDlR03O0lIvdoRDc",
            authDomain: "fighting-dog.firebaseapp.com",
            projectId: "fighting-dog",
            storageBucket: "fighting-dog.firebasestorage.app",
            messagingSenderId: "254470661072",
            appId: "1:254470661072:web:56207d4a96e0af6459cfd5",
            measurementId: "G-WLCQFQFE02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'fighting-dog-production';

        // --- State Management ---
        let currentState = {
            currentPage: 'home',
            isAuthorized: false,
            editingId: null,
            viewDate: new Date(),
            schedules: [],
            notices: [],
            resources: [],
            records: { team1: [], team2: [], siege: [] },
            currentRecordTab: 'team1',
            characters: [],
            extraInfo: []
        };

        const RANK_MAP = { '1등': 6, '2등': 5, '4강': 4, '8강': 3, '16강': 2, '32강': 1 };
        const ATTR_COLOR_MAP = { '화': 'attr-fire', '수': 'attr-water', '지': 'attr-earth', '풍': 'attr-wind' };
        const safeCreateIcons = () => { if (typeof lucide !== 'undefined') { lucide.createIcons(); } };

        // --- Core UI Functions (Fixed Order to prevent ReferenceErrors) ---
        window.initHome = () => {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            const upcoming = (currentState.schedules || []).filter(s => s.date >= todayStr).sort((a,b) => a.date.localeCompare(b.date)).slice(0, 3);
            const past = (currentState.schedules || []).filter(s => s.date < todayStr).sort((a,b) => b.date.localeCompare(a.date)).slice(0, 3);
            const upList = document.getElementById('upcoming-list');
            const paList = document.getElementById('past-list');
            if (upList) upList.innerHTML = upcoming.map(s => `<div class="flex justify-between items-center p-4 border-b border-white/5 group hover:bg-white/5 transition-colors"><span>${s.title}</span><span class="text-xs text-red-500 font-bold font-mono">${s.date}</span></div>`).join('') || "<div class='p-4 text-zinc-600 text-sm italic'>NO UPCOMING TASKS</div>";
            if (paList) paList.innerHTML = past.map(s => `<div class="flex justify-between items-center p-4 opacity-40"><span>${s.title}</span><span class="text-xs font-mono">${s.date}</span></div>`).join('') || "<div class='p-4 text-zinc-600 text-sm italic'>NO PAST RECORDS</div>";
            safeCreateIcons();
        };

        window.initBoard = (type) => {
            const col = type === 'notice' ? 'notices' : 'resources';
            const data = currentState[col] || [];
            const sorted = [...data].sort((a,b) => b.pinned - a.pinned);
            const contentEl = document.getElementById('board-content');
            if (contentEl) contentEl.innerHTML = sorted.map(item => `
                <tr class="hover:bg-white/5 group transition-all">
                    <td class="p-5 text-center">${item.pinned ? '<i data-lucide="pin" class="pin-active mx-auto" size="20"></i>' : '-'}</td>
                    <td class="p-5 font-bold text-gray-200 group-hover:text-red-500 cursor-pointer text-lg" onclick="window.viewBoardItem('${type}', '${item.id}')">${item.title}</td>
                    <td class="p-5 text-sm text-zinc-500 font-mono">${item.date}</td>
                    <td class="p-5 text-center">${item.file ? '<i data-lucide="paperclip" size="18" class="mx-auto text-blue-500/50"></i>' : '-'}</td>
                    <td class="p-5 text-center space-x-6">
                        <button onclick="window.editBoardItem('${type}', '${item.id}')" class="text-xs text-zinc-500 hover:text-white font-black uppercase tracking-tighter transition-colors">Edit</button>
                        <button onclick="window.openConfirmModal('boardDelete', '${type}', '${item.id}')" class="text-xs text-zinc-800 hover:text-red-600 font-black uppercase tracking-tighter transition-colors">Terminate</button>
                    </td>
                </tr>
            `).join('');
            safeCreateIcons();
        };

        window.initCalendar = () => {
            const grid = document.getElementById('calendar-grid');
            const header = document.getElementById('calendar-header-title');
            if (!grid || !header) return;
            const year = currentState.viewDate.getFullYear(), month = currentState.viewDate.getMonth();
            header.innerText = `${year}.${String(month + 1).padStart(2, '0')}`;
            const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date(), isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
            let html = '';
            for (let i = 0; i < firstDay; i++) html += `<div class="aspect-square card-bg p-2 opacity-5"></div>`;
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayEvents = (currentState.schedules || []).filter(s => s.date === dateStr);
                const isToday = isCurrentMonth && today.getDate() === day;
                const textColor = (firstDay + day - 1) % 7 === 0 ? 'text-red-500' : ((firstDay + day - 1) % 7 === 6 ? 'text-blue-500' : 'text-zinc-400');
                let eventsHtml = dayEvents.map(s => `<div onclick="event.stopPropagation(); window.openModal('calendarEdit', '${s.id}')" class="cal-event-badge">${s.title}</div>`).join('');
                html += `<div onclick="window.openCalendarAddModal(${year}, ${month + 1}, ${day})" class="aspect-square card-bg p-2 hover:bg-zinc-900 transition-all relative ${isToday ? 'today-cell' : 'border border-white/[0.02]'} overflow-hidden">
                    <span class="text-[10px] font-black ${textColor}">${day}</span><div class="w-full mt-1">${eventsHtml}</div></div>`;
            }
            grid.innerHTML = html;
            safeCreateIcons();
        };

        window.renderProtectedGrid = () => {
            const grid = document.getElementById('info-grid');
            if (!grid) return;
            const page = currentState.currentPage;
            let data = page === 'attributes' ? currentState.characters : currentState.extraInfo.filter(i => i.type === page);
            data.sort((a,b) => a.name.localeCompare(b.name, 'ko'));
            grid.innerHTML = data.map(item => `
                <div class="card-bg p-5 border-t-2 border-red-600 animate-fade-in flex flex-col justify-between hover:scale-[1.02] transition-transform">
                    <div>${item.attrs ? `<div class="flex flex-wrap gap-1 mb-3">${item.attrs.map(a => `<span class="${ATTR_COLOR_MAP[a]} px-2 py-0.5 rounded text-[10px] font-bold text-white">${a}</span>`).join('')}</div>` : ''}
                        <h4 class="text-xl font-black">${item.name}</h4>${item.desc ? `<p class="text-xs text-zinc-500 mt-2 line-clamp-3">${item.desc}</p>` : ''}</div>
                    <div class="flex justify-end gap-3 pt-4 mt-4 border-t border-white/5">
                        <button onclick="window.editInfo('${item.id}')" class="text-[10px] uppercase font-bold text-zinc-500 hover:text-blue-500 transition-colors">Edit</button>
                        <button onclick="window.openConfirmModal('infoDelete', null, '${item.id}')" class="text-[10px] uppercase font-bold text-zinc-500 hover:text-red-500 transition-colors">Delete</button>
                    </div></div>`).join('') || '<div class="col-span-full text-center py-20 opacity-30 italic font-bold">NO INTEL DATA FOUND.</div>';
            safeCreateIcons();
        };

        window.renderContent = () => {
            const root = document.getElementById('app-root');
            if (!root) return;
            const pageId = currentState.currentPage;
            if (['attributes', 'regular', 'siege'].includes(pageId)) {
                root.innerHTML = document.getElementById('tpl-protected').innerHTML;
                if (currentState.isAuthorized) window.showProtectedContent();
            } else {
                const tplId = `tpl-${pageId === 'home' ? 'home' : (pageId === 'notice' || pageId === 'resources') ? 'board' : pageId}`;
                const tpl = document.getElementById(tplId);
                if (tpl) {
                    root.innerHTML = tpl.innerHTML;
                    if (pageId === 'home') window.initHome();
                    else if (pageId === 'notice' || pageId === 'resources') window.initBoard(pageId);
                    else if (pageId === 'records') window.switchRecordTab(currentState.currentRecordTab);
                    else if (pageId === 'calendar') window.initCalendar();
                }
            }
            safeCreateIcons();
        };

        window.showProtectedContent = () => { 
            const gate = document.getElementById('password-gate'), content = document.getElementById('protected-content');
            if (gate && content) { gate.classList.add('hidden'); content.classList.remove('hidden'); window.renderProtectedGrid(); } 
        };

        // --- Auth & Sync ---
        async function initSync() {
            const syncCollections = ['schedules', 'notices', 'resources', 'records_team1', 'records_team2', 'records_siege', 'characters', 'extraInfo'];
            syncCollections.forEach(colName => {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', colName));
                onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (colName.startsWith('records_')) {
                        currentState.records[colName.replace('records_', '')] = data;
                        if (currentState.currentPage === 'records') window.switchRecordTab(currentState.currentRecordTab);
                    } else {
                        currentState[colName] = data;
                        if (currentState.currentPage === 'notice' || currentState.currentPage === 'resources') window.initBoard(currentState.currentPage);
                        else if (currentState.currentPage === 'attributes' || currentState.currentPage === 'regular' || currentState.currentPage === 'siege') window.renderProtectedGrid();
                    }
                    if (currentState.currentPage === 'home') window.initHome();
                    else if (currentState.currentPage === 'calendar') window.initCalendar();
                    document.getElementById('loading-overlay').style.display = 'none';
                });
            });
        }

        signInAnonymously(auth).then(() => { initSync(); window.navigateTo('home'); });

        // --- Window-Scoped Action Handlers ---
        window.navigateTo = (pageId) => {
            currentState.currentPage = pageId;
            const navItems = document.querySelectorAll('.nav-item');
            const navMap = { 'home': 'HOME', 'notice': '공지사항', 'resources': '자료실', 'records': '듀얼기록', 'calendar': '캘린더', 'attributes': '듀얼 속성', 'regular': '정규듀얼 정보', 'siege': '공성전 정보' };
            navItems.forEach(el => el.classList.toggle('active', el.innerText === navMap[pageId]));
            window.renderContent();
            window.scrollTo(0, 0);
        };

        window.switchRecordTab = (tab) => {
            currentState.currentRecordTab = tab;
            ['team1', 'team2', 'siege'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (el) el.className = t === tab ? 'px-8 py-3 rounded-lg bg-red-600 text-white font-black shadow-lg shadow-red-900/30' : 'px-8 py-3 rounded-lg text-zinc-500 hover:text-white font-bold transition-all';
            });
            const data = currentState.records[tab] || [];
            const listEl = document.getElementById('record-list');
            if (listEl) listEl.innerHTML = data.slice().sort((a,b) => b.date.localeCompare(a.date)).map(r => `
                <div class="flex justify-between items-center p-5 bg-black/40 rounded-xl border border-white/[0.03] hover:border-red-600/30 transition-all">
                    <div><div class="text-[10px] text-zinc-600 font-mono mb-1 uppercase">${r.date}</div><div class="font-black text-2xl text-red-600 tracking-tighter">${r.rank}</div></div>
                    <div class="flex gap-4">
                        <button onclick="window.editRecord('${r.id}')" class="text-zinc-600 hover:text-blue-500 transition-colors"><i data-lucide="edit-3" size="18"></i></button>
                        <button onclick="window.openConfirmModal('recordDelete', null, '${r.id}')" class="text-zinc-600 hover:text-red-500 transition-colors"><i data-lucide="trash-2" size="18"></i></button>
                    </div>
                </div>`).join('');
            window.initChart(data);
            safeCreateIcons();
        };

        window.initChart = (data) => {
            const ctx = document.getElementById('rankingChart')?.getContext('2d');
            if (!ctx) return;
            if (window.myChartInstance) window.myChartInstance.destroy();
            const displayData = data.slice().sort((a,b) => a.date.localeCompare(b.date)).slice(-10);
            window.myChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: displayData.map(r => r.date),
                    datasets: [{ label: 'Efficiency', data: displayData.map(r => RANK_MAP[r.rank]), borderColor: '#dc2626', backgroundColor: 'rgba(220, 38, 38, 0.1)', fill: true, tension: 0.4, pointRadius: 6, pointHoverRadius: 8, pointBackgroundColor: '#dc2626' }]
                },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 7, ticks: { callback: (v) => Object.keys(RANK_MAP).find(k => RANK_MAP[k] === v) || '', color: '#555' }, grid: { color: 'rgba(255,255,255,0.02)' } }, x: { grid: { display: false }, ticks: { color: '#555' } } } }
            });
        };

        window.changeCalendarMonth = (off) => { currentState.viewDate.setMonth(currentState.viewDate.getMonth() + off); window.initCalendar(); };
        window.openCalendarAddModal = (y, m, d) => window.openModal('calendarAdd', `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`);
        window.verifyPassword = () => { if (document.getElementById('pw-input').value === '191919') { currentState.isAuthorized = true; window.showProtectedContent(); } else alert('AUTH FAILED: ACCESS DENIED.'); };
        window.searchInfoGrid = () => {
            const term = document.getElementById('search-info').value.toLowerCase();
            document.querySelectorAll('#info-grid > div').forEach(c => c.style.display = c.innerText.toLowerCase().includes(term) ? '' : 'none');
        };

        window.openModal = (type, extra = null) => {
            const overlay = document.getElementById('modal-overlay'), body = document.getElementById('modal-body');
            overlay.classList.remove('hidden');
            let html = '';
            if (type === 'board') {
                const isNotice = currentState.currentPage === 'notice', col = isNotice ? 'notices' : 'resources';
                const item = extra ? (currentState[col] || []).find(i => i.id === extra) : null;
                currentState.editingId = extra;
                html = `<h3 class="text-3xl font-black italic mb-6 text-red-600">${extra ? 'UPDATE DATA' : 'UPLOAD INTEL'}</h3>
                    <div class="space-y-4">
                        <input type="text" id="m-title" value="${item?.title || ''}" placeholder="FILE TITLE" class="w-full bg-black border border-white/10 rounded-lg p-5 focus:border-red-600 outline-none">
                        <textarea id="m-content" placeholder="SUMMARY..." class="w-full bg-black border border-white/10 rounded-lg p-5 h-48 focus:border-red-600 outline-none">${item?.content || ''}</textarea>
                        <div class="p-5 bg-white/5 border border-dashed border-white/10 rounded-lg"><input type="file" id="m-file-input" class="text-xs text-zinc-500"></div>
                        <label class="flex items-center gap-3 text-xs text-zinc-400 cursor-pointer font-bold"><input type="checkbox" id="m-pin" ${item?.pinned ? 'checked' : ''} class="w-4 h-4 accent-red-600"> PIN TO TOP</label>
                        <input type="password" id="m-pw" placeholder="SECRET CODE" class="w-full bg-black border border-white/10 rounded-lg p-5 text-center text-xl tracking-[0.5em] outline-none focus:border-red-600">
                        <button onclick="window.saveBoard()" class="w-full btn-red py-5 rounded-lg font-black text-xl">DEPLOY</button></div>`;
            } else if (type === 'viewBoard') {
                const isNotice = currentState.currentPage === 'notice', col = isNotice ? 'notices' : 'resources';
                const item = (currentState[col] || []).find(i => i.id === extra);
                html = `<div class="animate-fade-in"><div class="text-red-600 text-[10px] font-black uppercase tracking-[0.4em] mb-4">SYNDICATE ARCHIVE</div>
                    <h3 class="text-4xl font-black italic mb-6 leading-tight">${item?.title}</h3>
                    <div class="text-[10px] text-zinc-600 font-bold mb-8 flex justify-between border-b border-white/5 pb-4 uppercase tracking-widest"><span>Date: ${item?.date}</span>${item?.file ? '<span class="text-blue-500">Attached</span>' : ''}</div>
                    <div class="text-zinc-300 leading-relaxed whitespace-pre-wrap min-h-[250px] mb-10 text-xl font-light">${item?.content || 'NO CONTENT.'}</div>
                    <button onclick="window.closeModal()" class="w-full bg-white/5 py-5 rounded-lg font-black text-zinc-500 hover:text-white hover:bg-white/10 transition-all uppercase">Exit Hub</button></div>`;
            } else if (type === 'record') {
                const item = extra ? (currentState.records[currentState.currentRecordTab] || []).find(r => r.id === extra) : null;
                currentState.editingId = extra;
                html = `<h3 class="text-2xl font-black mb-6">LOG DUAL RECORD</h3>
                    <div class="space-y-4">
                        <select id="r-rank" class="w-full bg-black border border-white/10 rounded-lg p-5 font-bold text-red-600">
                            ${Object.keys(RANK_MAP).map(k => `<option value="${k}" ${item?.rank === k ? 'selected' : ''}>${k}</option>`).join('')}
                        </select>
                        <input type="date" id="r-date" value="${item?.date || new Date().toISOString().split('T')[0]}" class="w-full bg-black border border-white/10 rounded-lg p-5">
                        <button onclick="window.saveRecord()" class="w-full btn-red py-5 rounded-lg font-black">LOG ENTRY</button></div>`;
            } else if (type === 'info') {
                const isAttr = currentState.currentPage === 'attributes', col = isAttr ? 'characters' : 'extraInfo';
                const item = extra ? currentState[col].find(i => i.id === extra) : null;
                currentState.editingId = extra;
                html = `<h3 class="text-2xl font-black mb-6 uppercase tracking-widest">${extra ? 'EDIT' : 'ADD'} DATA</h3>
                    <div class="space-y-4">
                        <input type="text" id="i-name" value="${item?.name || ''}" placeholder="NAME / TEAM" class="w-full bg-black border border-white/10 rounded-lg p-5 focus:border-red-600 outline-none">
                        ${isAttr ? `<div class="grid grid-cols-4 gap-2">${['수', '지', '화', '풍'].map(a => `<label class="flex flex-col items-center gap-3 p-4 bg-white/5 rounded-xl cursor-pointer hover:bg-red-600/20 transition-all font-black text-sm"><input type="checkbox" name="attr" value="${a}" ${item?.attrs?.includes(a) ? 'checked' : ''} class="w-5 h-5 accent-red-600"> ${a}</label>`).join('')}</div>` 
                        : `<textarea id="i-desc" placeholder="DETAILED INTEL..." class="w-full bg-black border border-white/10 rounded-lg p-5 h-48 focus:border-red-600 outline-none">${item?.desc || ''}</textarea>`}
                        <button onclick="window.saveInfo()" class="w-full btn-red py-5 rounded-lg font-black mt-4">SYNC TO HUB</button></div>`;
            } else if (type === 'calendarAdd') {
                html = `<h3 class="text-2xl font-black mb-6 uppercase italic tracking-wider">${extra} SCHEDULE</h3>
                    <div class="space-y-4"><input type="text" id="cal-title" placeholder="TASK TITLE..." class="w-full bg-black border border-white/10 rounded-lg p-5 outline-none focus:border-red-600">
                        <button onclick="window.saveCalendarEvent('${extra}')" class="w-full btn-red py-5 rounded-lg font-black">DEPLOY TASK</button></div>`;
            } else if (type === 'calendarEdit') {
                const item = currentState.schedules.find(s => s.id === extra);
                currentState.editingId = extra;
                html = `<h3 class="text-2xl font-black mb-6 uppercase">MODIFY MISSION</h3><div class="space-y-4">
                        <input type="text" id="cal-edit-title" value="${item?.title}" class="w-full bg-black border border-white/10 rounded-lg p-5 outline-none focus:border-red-600">
                        <div class="flex gap-4"><button onclick="window.openConfirmModal('calendarDelete', null, '${extra}')" class="flex-1 py-5 rounded-lg bg-zinc-900 font-bold hover:bg-zinc-800 transition-colors uppercase">Terminate</button>
                            <button onclick="window.updateCalendarEvent()" class="flex-1 btn-red py-5 rounded-lg font-black uppercase tracking-widest">Update</button></div></div>`;
            }
            body.innerHTML = html; safeCreateIcons();
        };

        window.closeModal = () => { document.getElementById('modal-overlay').classList.add('hidden'); currentState.editingId = null; };

        window.openConfirmModal = (type, page, id) => {
            const overlay = document.getElementById('modal-overlay'), body = document.getElementById('modal-body');
            overlay.classList.remove('hidden');
            body.innerHTML = `<div class="text-center py-6"><i data-lucide="alert-octagon" class="mx-auto text-red-600 mb-8" size="80"></i>
                <h3 class="text-4xl font-black italic mb-2 uppercase tracking-tighter">Destroy Intel?</h3><p class="text-zinc-500 mb-12 font-bold tracking-tight">이 데이터는 즉시 소각되며 복구할 수 없습니다.</p>
                <div class="flex gap-4"><button onclick="window.closeModal()" class="flex-1 py-5 rounded-lg bg-zinc-900 font-black tracking-widest">CANCEL</button>
                    <button onclick="window.executeDelete('${type}', '${page}', '${id}')" class="flex-1 py-5 rounded-lg btn-red font-black tracking-widest">DESTROY</button></div></div>`;
            safeCreateIcons();
        };

        window.executeDelete = async (type, page, id) => {
            let col = '';
            if (type === 'boardDelete') col = page === 'notice' ? 'notices' : 'resources';
            else if (type === 'recordDelete') col = `records_${currentState.currentRecordTab}`;
            else if (type === 'infoDelete') col = currentState.currentPage === 'attributes' ? 'characters' : 'extraInfo';
            else if (type === 'calendarDelete') col = 'schedules';
            if (col) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
            window.closeModal();
        };

        window.saveBoard = async () => {
            if (document.getElementById('m-pw').value !== '191919') return alert('ACCESS DENIED: WRONG SECRET CODE.');
            const type = currentState.currentPage, col = type === 'notice' ? 'notices' : 'resources';
            const title = document.getElementById('m-title').value;
            if (!title) return;
            const hasFile = document.getElementById('m-file-input')?.files?.length > 0;
            const id = currentState.editingId || Date.now().toString();
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id), { title, content: document.getElementById('m-content').value, pinned: document.getElementById('m-pin').checked, date: new Date().toISOString().split('T')[0], file: hasFile });
            window.closeModal();
        };

        window.saveRecord = async () => {
            const team = currentState.currentRecordTab, id = currentState.editingId || Date.now().toString();
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', `records_${team}`, id), { rank: document.getElementById('r-rank').value, date: document.getElementById('r-date').value });
            window.closeModal();
        };

        window.saveInfo = async () => {
            const page = currentState.currentPage, isAttr = page === 'attributes';
            const name = document.getElementById('i-name').value;
            if (!name) return;
            const id = currentState.editingId || Date.now().toString();
            let data = { name, type: page };
            if (isAttr) { data.attrs = Array.from(document.querySelectorAll('input[name="attr"]:checked')).map(el => el.value); data.type = 'attr'; }
            else data.desc = document.getElementById('i-desc').value;
            const col = isAttr ? 'characters' : 'extraInfo';
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id), data);
            window.closeModal();
        };

        window.saveCalendarEvent = async (dateStr) => {
            const title = document.getElementById('cal-title').value;
            if (!title) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedules', Date.now().toString()), { title, date: dateStr });
            window.closeModal();
        };

        window.updateCalendarEvent = async () => {
            const title = document.getElementById('cal-edit-title').value;
            if (!title) return;
            const original = (currentState.schedules || []).find(s => s.id === currentState.editingId);
            if(original) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedules', currentState.editingId), { ...original, title });
            window.closeModal();
        };

        window.toggleMobileMenu = () => {
            const n = document.getElementById('main-nav');
            if (n) { n.classList.toggle('hidden'); n.classList.toggle('flex'); n.classList.toggle('flex-col'); n.classList.toggle('absolute'); n.classList.toggle('top-full'); n.classList.toggle('left-0'); n.classList.toggle('w-full'); n.classList.toggle('bg-black'); n.classList.toggle('p-6'); }
        };

        window.editBoardItem = (t, id) => window.openModal('board', id);
        window.editRecord = (id) => window.openModal('record', id);
        window.editInfo = (id) => window.openModal('info', id);
    </script>
</body>
</html>
